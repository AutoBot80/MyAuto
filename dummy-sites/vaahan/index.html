<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Vahan – Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 3rem auto; padding: 1rem; font-size: 14px; }
    h1 { color: #063; font-size: 1.25rem; }
    label { display: block; margin-top: 0.6rem; }
    input { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #063; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Dummy Vahan (Parivahan)</h1>
  <p>Vehicle registration – any credentials work for testing.</p>
  <form id="vahan-login-form" action="application.html" method="get">
    <label for="vahan-username">Username</label>
    <input type="text" id="vahan-username" name="user" placeholder="User" />
    <label for="vahan-password">Password</label>
    <input type="password" id="vahan-password" name="pass" placeholder="Password" />
    <button type="submit" id="vahan-login-btn">Login</button>
  </form>
</body>
</html>
