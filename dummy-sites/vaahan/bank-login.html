<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Banking Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">SB</div>
        <div class="brand-copy">
          <h1>SBI Payment Gateway</h1>
          <p>Merchant bank redirection screen</p>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="bank-panel">
        <div class="tabs">
          <span class="tab">Banking</span>
          <span class="tab">Corporate Banking</span>
          <span class="tab">yono BUSINESS</span>
        </div>
        <h2>LOGIN</h2>
        <div class="field-grid">
          <div class="field">
            <label for="bank-user-id">User Name</label>
            <input id="bank-user-id" value="dealer.demo" />
          </div>
          <div class="field">
            <label for="bank-password">Password</label>
            <input id="bank-password" type="password" value="password" />
          </div>
        </div>
        <div class="warning-box" style="margin-top: 1rem;">
          <p style="margin: 0 0 0.4rem;"><strong>Virtual Keyboard</strong></p>
          <p style="margin: 0 0 0.5rem;">Do not share your credentials or OTP. Refund timelines depend on the merchant and bank.</p>
          <p style="margin: 0;">Click here to abort this transaction &amp; return to the merchant site.</p>
        </div>
        <div class="payment-actions" style="margin-top: 1rem;">
          <button type="button" id="vahan-bank-login" class="button">LOGIN</button>
          <a href="payment.html" class="button-secondary">Abort</a>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      const { ensureQueryBackedApplication } = window.VahanDummy;
      const app = ensureQueryBackedApplication();
      if (!app) {
        window.location.href = "payment.html";
        return;
      }
      document.getElementById("vahan-bank-login").addEventListener("click", function () {
        window.location.href = "bank-confirm.html?application_id=" + encodeURIComponent(app.application_id);
      });
    })();
  </script>
</body>
</html>
