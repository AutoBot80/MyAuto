<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Vahan – Search &amp; Payment</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; font-size: 14px; }
    .top-nav { background: #063; color: #fff; padding: 0.5rem 1rem; }
    .top-nav a { color: #fff; text-decoration: none; margin-right: 1rem; }
    .main { max-width: 560px; margin: 2rem auto; padding: 1rem; }
    .section { border: 1px solid #ccc; border-radius: 4px; padding: 1rem; background: #fafafa; margin-bottom: 1rem; }
    .section h2 { margin: 0 0 0.75rem 0; font-size: 14px; color: #063; }
    label { display: block; margin-top: 0.5rem; font-weight: 500; }
    input { width: 100%; padding: 0.4rem; margin-top: 0.2rem; box-sizing: border-box; max-width: 320px; }
    .btn { margin-top: 0.75rem; padding: 0.6rem 1.2rem; background: #063; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 0.5rem; }
    .btn:hover { background: #052; }
    .btn-pay { background: #063; }
    .result { margin-top: 1rem; padding: 1rem; border: 1px solid #063; border-radius: 4px; background: #f0f8f0; }
    .result dl { margin: 0; display: grid; grid-template-columns: 140px 1fr; gap: 0.25rem 1rem; }
    .result dt { margin: 0; font-weight: 600; color: #333; }
    .result dd { margin: 0; }
    .msg { margin-top: 0.75rem; font-weight: 600; }
    .msg.err { color: #c00; }
    .msg.ok { color: #063; }
  </style>
</head>
<body>
  <nav class="top-nav" role="navigation">
    <a href="index.html">Registration</a>
    <a href="search.html">Search &amp; Payment</a>
  </nav>

  <div class="main">
    <h1 style="font-size: 18px; margin-bottom: 1rem;">Search application &amp; Pay</h1>

    <div class="section">
      <h2>Search by RTO Dealer ID and Application ID</h2>
      <form id="vahan-search-form">
        <label for="vahan-search-dealer-id">RTO Dealer ID</label>
        <input type="text" id="vahan-search-dealer-id" placeholder="e.g. RTO100001" />

        <label for="vahan-search-application-id">Application ID</label>
        <input type="text" id="vahan-search-application-id" placeholder="e.g. APP1234567890-abc123" />

        <button type="submit" id="vahan-search-btn" class="btn">Search</button>
      </form>
      <p id="vahan-search-msg" class="msg" style="display: none;"></p>
    </div>

    <div id="vahan-result-section" class="section" style="display: none;">
      <h2>Application details</h2>
      <div id="vahan-result-content" class="result"></div>
      <button type="button" id="vahan-payment-btn" class="btn btn-pay">Pay &amp; Generate PDF</button>
    </div>
  </div>

  <script>
    (function() {
      var STORAGE_KEY = 'vaahan_applications';

      function getApplications() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      function saveApplication(app) {
        var apps = getApplications();
        apps[app.application_id] = app;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
      }

      function generateTcNumber() {
        return 'TC' + Date.now() + '-' + Math.random().toString(36).slice(2, 10).toUpperCase();
      }

      function getQueryParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      var currentApp = null;

      function renderResult(app) {
        var html = '<dl>' +
          '<dt>Application ID</dt><dd>' + (app.application_id || '—') + '</dd>' +
          '<dt>RTO Dealer ID</dt><dd>' + (app.rto_dealer_id || '—') + '</dd>' +
          '<dt>Customer name</dt><dd>' + (app.customer_name || '—') + '</dd>' +
          '<dt>Chassis no.</dt><dd>' + (app.chassis_no || '—') + '</dd>' +
          '<dt>Vehicle model</dt><dd>' + (app.vehicle_model || '—') + '</dd>' +
          '<dt>Vehicle colour</dt><dd>' + (app.vehicle_colour || '—') + '</dd>' +
          '<dt>Fuel type</dt><dd>' + (app.fuel_type || '—') + '</dd>' +
          '<dt>Year of mfg</dt><dd>' + (app.year_of_mfg || '—') + '</dd>' +
          '<dt>Total cost</dt><dd>₹' + (app.total_cost != null ? Number(app.total_cost).toLocaleString('en-IN') : '—') + '</dd>' +
          '<dt>RTO fees</dt><dd id="vahan-result-rto-fees" data-rto-fees="' + (app.rto_fees != null ? String(app.rto_fees) : '') + '">₹' + (app.rto_fees != null ? Number(app.rto_fees).toLocaleString('en-IN') : '—') + '</dd>' +
          '<dt>Status</dt><dd>' + (app.status || '—') + '</dd>' +
          (app.tc_number ? ('<dt>TC number</dt><dd>' + app.tc_number + '</dd>') : '') +
          '</dl>';
        document.getElementById('vahan-result-content').innerHTML = html;
      }

      document.getElementById('vahan-search-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var dealerId = document.getElementById('vahan-search-dealer-id').value.trim();
        var appId = document.getElementById('vahan-search-application-id').value.trim();
        var msgEl = document.getElementById('vahan-search-msg');
        var resultSection = document.getElementById('vahan-result-section');

        if (!appId && !dealerId) {
          msgEl.textContent = 'Enter at least Application ID or RTO Dealer ID.';
          msgEl.className = 'msg err';
          msgEl.style.display = 'block';
          resultSection.style.display = 'none';
          return;
        }

        var apps = getApplications();
        var found = null;
        if (appId && apps[appId]) {
          found = apps[appId];
          if (dealerId && found.rto_dealer_id !== dealerId) {
            found = null;
          }
        } else if (dealerId) {
          for (var id in apps) {
            if (apps[id].rto_dealer_id === dealerId) {
              if (!appId || apps[id].application_id === appId) {
                found = apps[id];
                break;
              }
            }
          }
        }

        if (!found) {
          msgEl.textContent = 'No application found for the given criteria.';
          msgEl.className = 'msg err';
          msgEl.style.display = 'block';
          resultSection.style.display = 'none';
          return;
        }

        currentApp = found;
        msgEl.style.display = 'none';
        renderResult(found);
        resultSection.style.display = 'block';
      });

      document.getElementById('vahan-payment-btn').addEventListener('click', function() {
        if (!currentApp) return;
        var tcNumber = generateTcNumber();
        currentApp.tc_number = tcNumber;
        currentApp.status = 'paid';
        saveApplication(currentApp);

        var win = window.open('', '_blank', 'width=600,height=700');
        var doc = win.document;
        doc.open();
        doc.write(
          '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>RTO Receipt - ' + currentApp.application_id + '</title>' +
          '<style>body{font-family:Arial,sans-serif;padding:2rem;max-width:520px;margin:0 auto;} h1{font-size:18px;color:#063;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ccc;padding:0.4rem;text-align:left;} th{background:#f0f0f0;}' +
          '</style></head><body>' +
          '<h1>RTO Registration – Payment receipt</h1>' +
          '<p><strong>TC number:</strong> ' + tcNumber + '</p>' +
          '<table>' +
          '<tr><th>Field</th><th>Value</th></tr>' +
          '<tr><td>Application ID</td><td>' + (currentApp.application_id || '—') + '</td></tr>' +
          '<tr><td>RTO Dealer ID</td><td>' + (currentApp.rto_dealer_id || '—') + '</td></tr>' +
          '<tr><td>Customer name</td><td>' + (currentApp.customer_name || '—') + '</td></tr>' +
          '<tr><td>Chassis no.</td><td>' + (currentApp.chassis_no || '—') + '</td></tr>' +
          '<tr><td>Vehicle model</td><td>' + (currentApp.vehicle_model || '—') + '</td></tr>' +
          '<tr><td>Vehicle colour</td><td>' + (currentApp.vehicle_colour || '—') + '</td></tr>' +
          '<tr><td>Fuel type</td><td>' + (currentApp.fuel_type || '—') + '</td></tr>' +
          '<tr><td>Year of mfg</td><td>' + (currentApp.year_of_mfg || '—') + '</td></tr>' +
          '<tr><td>Total cost</td><td>₹' + (currentApp.total_cost != null ? Number(currentApp.total_cost).toLocaleString('en-IN') : '—') + '</td></tr>' +
          '<tr><td>RTO fees</td><td>₹' + (currentApp.rto_fees != null ? Number(currentApp.rto_fees).toLocaleString('en-IN') : '—') + '</td></tr>' +
          '<tr><td>Status</td><td>' + (currentApp.status || '—') + '</td></tr>' +
          '</table>' +
          '<p style="margin-top:1.5rem;font-size:12px;color:#666;">Use browser Print (Ctrl+P) and "Save as PDF" to download this receipt.</p>' +
          '</body></html>'
        );
        doc.close();
        win.focus();
        setTimeout(function() { win.print(); }, 300);
      });

      var prefillAppId = getQueryParam('application_id');
      if (prefillAppId) {
        document.getElementById('vahan-search-application-id').value = prefillAppId;
        document.getElementById('vahan-search-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
      }
    })();
  </script>
</body>
</html>
