<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VAHAN - Assigned Office &amp; Action</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">VH</div>
        <div class="brand-copy">
          <h1>Assigned Office &amp; Action</h1>
          <p>Pending Applications / Movement screen</p>
        </div>
      </div>
      <nav class="topbar-nav">
        <a href="index.html">Start</a>
        <a href="application.html">Owner Information</a>
      </nav>
    </header>

    <main class="container">
      <section class="table-panel">
        <h2>Pending Applications</h2>
        <form id="vahan-search-form" class="field-grid">
          <div class="field">
            <label for="vahan-search-application-id">Application No</label>
            <input type="text" id="vahan-search-application-id" />
          </div>
          <div class="field">
            <label for="vahan-search-dealer-id">Assigned Office &amp; Action</label>
            <input type="text" id="vahan-search-dealer-id" />
          </div>
          <div class="field">
            <label for="vahan-regno-part1">Registration No - Part 1 (First 5 Chars)</label>
            <input type="text" id="vahan-regno-part1" maxlength="5" />
          </div>
          <div class="field">
            <label for="vahan-regno-part2">Registration No - Part 2 (Next 10 Chars)</label>
            <input type="text" id="vahan-regno-part2" maxlength="10" />
          </div>
          <div class="workflow-actions" style="grid-column: 1 / -1;">
            <button type="submit" id="vahan-search-btn" class="button">Get Pending Work</button>
            <button type="button" id="vahan-pull-back-btn" class="button-secondary">Pull Back Application</button>
          </div>
        </form>
        <p id="vahan-search-msg" class="hint hidden"></p>

        <div class="table-wrap" style="margin-top: 1rem;">
          <table id="vahan-worklist-table">
            <thead>
              <tr>
                <th>Application No</th>
                <th>Registration No</th>
                <th>Assigned Office &amp; Action</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="vahan-worklist-body"></tbody>
          </table>
        </div>
      </section>

      <section id="vahan-result-section" class="table-panel hidden">
        <h2>Workflow / Movement</h2>
        <div class="workflow-actions" style="margin-bottom: 1rem;">
          <button type="button" id="vahan-next-seat-btn" class="button">Proceed to Next Seat</button>
          <button type="button" id="vahan-upload-btn" class="button">Upload Files / Add To Cart</button>
          <button type="button" id="vahan-revert-btn" class="button-secondary">Revert File for Rectification</button>
        </div>

        <div id="vahan-result-content" class="panel" style="padding: 1rem;"></div>
        <p id="vahan-upload-status" class="hint hidden" data-uploaded="0"></p>

        <div class="workflow-actions" style="margin-top: 1rem;">
          <button type="button" id="vahan-payment-btn" class="button">Proceed to PAYMENT GATEWAY</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      const {
        ensureQueryBackedApplication,
        getApplications,
        saveApplication,
        escapeHtml,
        currency,
        getQueryParam,
      } = window.VahanDummy;

      let currentApp = ensureQueryBackedApplication();

      function renderWorklist(apps) {
        const body = document.getElementById("vahan-worklist-body");
        body.innerHTML = apps.map(function (app) {
          return "<tr data-application-id=\"" + escapeHtml(app.application_id) + "\">" +
            "<td>" + escapeHtml(app.application_id) + "</td>" +
            "<td>" + escapeHtml(app.registration_no || "") + "</td>" +
            "<td>" + escapeHtml(app.assigned_office || "Assigned Office & Action") + "</td>" +
            "<td><span class=\"status-pill\">" + escapeHtml(app.status || "Pending Applications") + "</span></td>" +
          "</tr>";
        }).join("");
      }

      function renderResult(app) {
        currentApp = app;
        document.getElementById("vahan-result-section").classList.remove("hidden");
        const uploadStatus = document.getElementById("vahan-upload-status");
        const tcHtml = app.pay_txn_id
          ? "<dt>TC Number</dt><dd id=\"vahan-result-tc-number\" data-tc=\"" + escapeHtml(app.pay_txn_id) + "\">" + escapeHtml(app.pay_txn_id) + "</dd>"
          : "";
        document.getElementById("vahan-result-content").innerHTML =
          "<dl class=\"summary-grid\">" +
            "<dt>Application No</dt><dd>" + escapeHtml(app.application_id) + "</dd>" +
            "<dt>Registration Type</dt><dd>" + escapeHtml(app.registration_type) + "</dd>" +
            "<dt>Owner Name</dt><dd>" + escapeHtml(app.owner_name) + "</dd>" +
            "<dt>Registration No</dt><dd>" + escapeHtml(app.registration_no) + "</dd>" +
            "<dt>Vehicle</dt><dd>" + escapeHtml(app.vehicle_model + " / " + app.vehicle_colour) + "</dd>" +
            "<dt>Chassis No</dt><dd>" + escapeHtml(app.chassis_no) + "</dd>" +
            "<dt>Insurance</dt><dd>" + escapeHtml(app.insurer_name) + "</dd>" +
            "<dt>Financier</dt><dd>" + escapeHtml(app.bank_name) + "</dd>" +
            "<dt>RTO Fees</dt><dd id=\"vahan-result-rto-fees\" data-rto-fees=\"" + escapeHtml(app.rto_fees) + "\">" + currency(app.rto_fees) + "</dd>" +
            "<dt>Status</dt><dd>" + escapeHtml(app.status) + "</dd>" +
            tcHtml +
          "</dl>";
        if (app.files_uploaded) {
          uploadStatus.textContent = "Files uploaded and row added to RTO Cart.";
          uploadStatus.dataset.uploaded = "1";
          uploadStatus.classList.remove("hidden");
        } else {
          uploadStatus.textContent = "";
          uploadStatus.dataset.uploaded = "0";
          uploadStatus.classList.add("hidden");
        }
      }

      function findMatchingApplication() {
        const applicationId = document.getElementById("vahan-search-application-id").value.trim();
        const dealerId = document.getElementById("vahan-search-dealer-id").value.trim();
        const reg1 = document.getElementById("vahan-regno-part1").value.trim();
        const reg2 = document.getElementById("vahan-regno-part2").value.trim();
        const apps = Object.values(getApplications());
        return apps.find(function (app) {
          if (applicationId && app.application_id !== applicationId) return false;
          if (dealerId && (app.assigned_office || app.rto_dealer_id) !== dealerId) return false;
          if (reg1 && app.reg_part1 !== reg1) return false;
          if (reg2 && app.reg_part2 !== reg2) return false;
          return true;
        }) || null;
      }

      function seedSearchFields() {
        if (!currentApp) return;
        document.getElementById("vahan-search-application-id").value = currentApp.application_id || "";
        document.getElementById("vahan-search-dealer-id").value = currentApp.assigned_office || currentApp.rto_dealer_id || "";
        document.getElementById("vahan-regno-part1").value = currentApp.reg_part1 || "";
        document.getElementById("vahan-regno-part2").value = currentApp.reg_part2 || "";
      }

      renderWorklist(Object.values(getApplications()).sort(function (a, b) {
        return String(b.created_at || "").localeCompare(String(a.created_at || ""));
      }));
      seedSearchFields();
      if (currentApp) {
        renderResult(currentApp);
      }

      document.getElementById("vahan-search-form").addEventListener("submit", function (event) {
        event.preventDefault();
        const found = findMatchingApplication();
        const msg = document.getElementById("vahan-search-msg");
        if (!found) {
          msg.textContent = "No application found for the given criteria.";
          msg.classList.remove("hidden");
          document.getElementById("vahan-result-section").classList.add("hidden");
          return;
        }
        msg.classList.add("hidden");
        renderResult(found);
      });

      document.getElementById("vahan-next-seat-btn").addEventListener("click", function () {
        if (!currentApp) return;
        currentApp.status = currentApp.pay_txn_id ? "Paid" : "Ready for Payment";
        saveApplication(currentApp);
        renderWorklist(Object.values(getApplications()));
        renderResult(currentApp);
      });

      document.getElementById("vahan-upload-btn").addEventListener("click", function () {
        if (!currentApp) return;
        currentApp.files_uploaded = true;
        currentApp.files_uploaded_at = new Date().toISOString();
        currentApp.status = "Added To Cart";
        saveApplication(currentApp);
        renderWorklist(Object.values(getApplications()));
        renderResult(currentApp);
      });

      document.getElementById("vahan-revert-btn").addEventListener("click", function () {
        if (!currentApp) return;
        currentApp.status = "Rectification";
        saveApplication(currentApp);
        renderWorklist(Object.values(getApplications()));
        renderResult(currentApp);
      });

      document.getElementById("vahan-pull-back-btn").addEventListener("click", function () {
        if (!currentApp) return;
        currentApp.status = "Pulled Back";
        saveApplication(currentApp);
        renderWorklist(Object.values(getApplications()));
        renderResult(currentApp);
      });

      document.getElementById("vahan-payment-btn").addEventListener("click", function () {
        if (!currentApp) return;
        window.location.href = "payment.html?application_id=" + encodeURIComponent(currentApp.application_id);
      });

      if (getQueryParam("paid") === "1" && currentApp) {
        renderResult(currentApp);
      }
    })();
  </script>
</body>
</html>
