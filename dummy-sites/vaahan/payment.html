<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PAYMENT GATEWAY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">VH</div>
        <div class="brand-copy">
          <h1>PAYMENT GATEWAY</h1>
          <p>Government payment collection</p>
        </div>
      </div>
      <nav class="topbar-nav">
        <a href="search.html">Assigned Office &amp; Action</a>
      </nav>
    </header>

    <main class="container">
      <section class="bank-panel">
        <div class="payment-header">
          <div>
            <h2>PAYMENT GATEWAY</h2>
            <p class="page-subtitle">Complete the payment form using the same labels seen in the recording.</p>
          </div>
        </div>

        <div class="gateway-card">
          <div class="field-grid">
            <div class="field">
              <label for="vahan-payment-id">Payment ID</label>
              <input id="vahan-payment-id" readonly />
            </div>
            <div class="field">
              <label for="vahan-payment-amount">Amount</label>
              <input id="vahan-payment-amount" readonly />
            </div>
            <div class="field">
              <label for="vahan-payment-gateway">Select Payment Gateway</label>
              <select id="vahan-payment-gateway">
                <option value="E-GRAS">E-GRAS</option>
                <option value="SBI ePay">SBI ePay</option>
              </select>
            </div>
          </div>
          <div style="margin-top: 1rem;">
            <label class="radio-tile">
              <input type="checkbox" id="vahan-accept-terms" />
              I accept terms and conditions
            </label>
          </div>
          <div class="payment-actions" style="margin-top: 1rem;">
            <button type="button" id="vahan-payment-continue" class="button">Continue</button>
            <a href="search.html" class="button-secondary">Back</a>
          </div>
          <p class="hint" style="margin-top: 1rem;">Powered by National Informatics Centre. All Rights Reserved</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      const { ensureQueryBackedApplication, currency } = window.VahanDummy;
      const app = ensureQueryBackedApplication();
      if (!app) {
        window.location.href = "search.html";
        return;
      }

      document.getElementById("vahan-payment-id").value = app.application_id;
      document.getElementById("vahan-payment-amount").value = currency(app.rto_fees);

      document.getElementById("vahan-payment-continue").addEventListener("click", function () {
        if (!document.getElementById("vahan-accept-terms").checked) {
          alert("Please accept terms and conditions");
          return;
        }
        window.location.href = "bank-login.html?application_id=" + encodeURIComponent(app.application_id);
      });
    })();
  </script>
</body>
</html>
