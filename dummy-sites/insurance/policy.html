<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HIBIPL - New Policy Creation</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; font-size: 12px; }
    .top-nav { background: #333; color: #fff; padding: 0.4rem 1rem; display: flex; gap: 1rem; align-items: center; }
    .top-nav a { color: #fff; text-decoration: none; }
    .top-nav a.active { font-weight: bold; text-decoration: underline; }
    .main { max-width: 1200px; margin: 0 auto; padding: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .section { border: 1px solid #ccc; border-radius: 4px; padding: 0.75rem; background: #fafafa; }
    .section h3 { margin: 0 0 0.6rem 0; font-size: 13px; color: #333; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem; }
    .form-row label { margin: 0; }
    .form-row input, .form-row select { padding: 0.25rem 0.4rem; }
    .full { grid-column: 1 / -1; }
    .btn { padding: 0.45rem 0.8rem; background: #06c; color: #fff; border: none; border-radius: 4px; text-decoration: none; }
  </style>
</head>
<body>
  <nav class="top-nav" role="navigation">
    <a href="dms-entry.html">Policy Issuance</a>
    <a href="policy.html" class="active">New Policy</a>
    <a href="dms-entry.html">Claims</a>
    <a href="dms-entry.html">Reports</a>
  </nav>
  <div class="main">
    <div class="section">
      <h3>New Policy - Two Wheeler</h3>
      <div class="form-row"><label>Insurance Company*</label><select><option>Universal Sompo general insurance</option></select></div>
      <div class="form-row"><label>Policy Tenure</label><select><option>Bundled 1Yr+5Yr</option></select></div>
      <div class="form-row"><label>Manufacturer*</label><select><option>Hero Motocorp</option></select></div>
      <div class="form-row"><label>Proposer Type*</label><select><option>Individual</option></select></div>
      <div class="form-row"><label>Proposer Name</label><input value="LEKHRAJ" /></div>
      <div class="form-row"><label>Gender</label><select><option>Male</option><option>Female</option></select></div>
      <div class="form-row"><label>Date of Birth</label><input value="01/01/2000" /></div>
      <div class="form-row"><label>Marital Status</label><select><option>Married</option><option>Single</option></select></div>
      <div class="form-row"><label>Occupation Type</label><select><option>Farmer/Farm Related</option></select></div>
      <div class="form-row"><label>Mobile No</label><input value="9694585832" /></div>
      <div class="form-row"><label>Alternate / Landline No</label><input id="ins-alt-phone" value="" /></div>
      <div class="form-row"><label>Proposer State</label><select><option>RAJASTHAN</option></select></div>
      <div class="form-row"><label>Proposer City</label><select><option>Bharatpur</option></select></div>
      <div class="form-row"><label>Pin Code</label><input value="321001" /></div>
      <div class="form-row full"><label>Address</label><input value="S/O LALCHAND JAMUN KE BAAG KE PASS GOLPURA ROAD SUBHASH NAGAR" /></div>
    </div>
    <div class="section">
      <h3>Vehicle / Add-on / Nominee / Payment</h3>
      <div class="form-row"><label>Vehicle Type</label><select><option>Non-Electric</option></select></div>
      <div class="form-row"><label>Date of First Sale</label><input value="20/03/2026" /></div>
      <div class="form-row"><label>Vehicle Class</label><select><option>Private</option></select></div>
      <div class="form-row"><label>RTO</label><select><option>Bharatpur</option></select></div>
      <div class="form-row"><label>Frame No.</label><input value="MBLHAW483T5C83376" /></div>
      <div class="form-row"><label>Engine No.</label><input value="HA11F7T5C52111" /></div>
      <div class="form-row"><label>Model Name</label><input value="SPL PLUS CAST" /></div>
      <div class="form-row"><label>Ex-Showroom</label><input value="75202" /></div>
      <div class="form-row"><label>Year of Manufacture</label><input value="2026" /></div>
      <div class="form-row"><label>Fuel Type</label><select><option>Petrol</option></select></div>
      <div class="form-row"><label>Nominee Name</label><input value="SAVITRI" /></div>
      <div class="form-row"><label>Nominee Age</label><input value="44" /></div>
      <div class="form-row"><label>Nominee Gender</label><select><option>Female</option><option>Male</option></select></div>
      <div class="form-row"><label>Relation</label><select><option>Wife</option></select></div>
      <div class="form-row"><label>Financer Name</label><input /></div>
      <div class="form-row"><label>Payment Mode</label><select><option>Online</option><option>Cash</option></select></div>
      <div class="form-row"><label>Prefered CC</label><select><option>HDFC</option></select></div>
      <div class="form-row full"><label>Add-ons</label><div>ND Cover | RTI Cover | Tyre and Rim Guard | CPA Cover | Un-named Driver | Un-named Passenger</div></div>
      <div class="form-row full"><a class="btn" href="issued.html">Issue Policy (dummy)</a></div>
    </div>
  </div>
</body>
</html>
