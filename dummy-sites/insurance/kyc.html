<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hero INSURANCE BROKING - KYC Verification</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; font-size: 12px; }
    .top-nav { background: #243447; color: #fff; padding: 0.5rem 1rem; }
    .main { max-width: 920px; margin: 0 auto; padding: 1rem; }
    .section { border: 1px solid #ccc; border-radius: 4px; padding: 1rem; background: #fafafa; }
    .form-row { display: grid; grid-template-columns: 290px 1fr; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    input, select { padding: 0.3rem 0.45rem; width: 100%; }
    .btn { padding: 0.45rem 0.8rem; background: #06c; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .hint { color: #555; }
  </style>
</head>
<body>
  <div class="top-nav">Hero INSURANCE BROKING</div>
  <div class="main">
    <div class="section">
      <h3>KYC Verification</h3>
      <div class="form-row"><label>Insurance Company</label><select id="ins-company"><option>Universal Sompo general insurance</option></select></div>
      <div class="form-row"><label>KYC Partner</label><select id="ins-kyc-partner"><option>Signzy</option></select></div>
      <div class="form-row"><label>Proposer Type</label><select id="ins-proposer-type"><option>Individual</option></select></div>
      <div class="form-row"><label>Officially Valid Document (OVD) Type</label><select id="ins-ovd-type"><option>AADHAAR EXTRACTION</option><option>AADHAAR CARD</option><option>PAN CARD</option></select></div>
      <div class="form-row"><label>Mobile No.</label><input id="ins-mobile-no" value="9694585832" /></div>
      <div class="form-row"><label>AADHAAR Front Image</label><input id="ins-aadhar-front" type="file" /></div>
      <div class="form-row"><label>AADHAAR Rear Image</label><input id="ins-aadhar-rear" type="file" /></div>
      <div class="form-row"><label>Customer Photo</label><input id="ins-customer-photo" type="file" /></div>
      <div class="form-row"><label>Are you or anyone in your family associated with a political party or organisation?</label><select id="ins-pep"><option>No</option><option>Yes</option></select></div>
      <div class="form-row"><label>Consent</label><label><input id="ins-consent" type="checkbox" checked style="width:auto;" /> I hereby give my consent for KYC verification.</label></div>
      <p class="hint">KYC already verified against AADHAAR CARD No. 9694585832, please proceed for policy issuance.</p>
      <p><button id="ins-proceed" class="btn" onclick="location.href='kyc-success.html'">Proceed</button></p>
    </div>
  </div>
</body>
</html>
