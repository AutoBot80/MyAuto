<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hero Connect - Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 3rem auto; padding: 1rem; }
    h1 { color: #196; font-size: 1.25rem; }
    label { display: block; margin-top: 0.6rem; }
    input { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #196; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Hero Connect</h1>
  <p>connect.heromotocorp.biz - test login (any credentials work).</p>
  <form id="dms-login-form" action="my-sales.html" method="get">
    <label for="dms-username">User ID</label>
    <input type="text" id="dms-username" name="user" placeholder="Enter User ID" />
    <label for="dms-password">Password</label>
    <input type="password" id="dms-password" name="pass" placeholder="Password" />
    <label for="dms-remember-user" style="display:flex; align-items:center; gap:0.5rem;">
      <input type="checkbox" id="dms-remember-user" name="remember_user" style="width:auto;" />
      Remember my User ID
    </label>
    <button type="submit" id="dms-login-btn">Login</button>
    <div style="margin-top:0.75rem; font-size:12px; color:#555;">Forgot Password</div>
  </form>
</body>
</html>
