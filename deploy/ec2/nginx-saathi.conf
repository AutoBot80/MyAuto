# Nginx site: proxy to Gunicorn on loopback. Install to /etc/nginx/conf.d/saathi.conf
# and remove the bootstrap-only saathi-health.conf when the API is live.
#
# ALB target group health check: GET /health → 200 (FastAPI returns JSON).

upstream saathi_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Long-running SSE (Add Sales consolidated scan) + OCR can go several minutes without bytes if the
    # PDF is slow; default 60s proxy_* timeouts yield net::ERR_HTTP2_PROTOCOL_ERROR ~exactly 1 min in DevTools.
    location ^~ /uploads/ {
        proxy_pass http://saathi_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    location / {
        proxy_pass http://saathi_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
